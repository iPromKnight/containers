---
# https://github.com/aelsabbahy/goss/blob/master/docs/manual.md#process
#
# The container is tested without real Proton credentials, so /health returns
# 503 (configuration_error: true) — that's still proof the binary started, the
# HTTP server is up, and the endpoint is responding. We accept either status
# code so this works as both a smoke test and a creds-equipped end-to-end run.
process:
  updater:
    running: true

http:
  http://127.0.0.1:8080/health:
    # 503 is the expected status when running without creds (configuration_error).
    # We only need to prove the HTTP server is up and answering — anything beyond
    # that needs real Proton credentials, which CI shouldn't carry.
    status: 503
    timeout: 5000
